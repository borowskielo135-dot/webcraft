<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebCraft | Panel</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="photos/logo.png" />
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <!-- ═══ AUTH SCREEN ═══ -->
    <div id="authScreen">
      <div class="auth-box">
        <div class="auth-logo">Web<span>Craft</span></div>
        <p class="auth-sub">Zaloguj się, aby zarządzać swoimi zamówieniami</p>

        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin">Logowanie</button>
          <button class="auth-tab" id="tabRegister">Rejestracja</button>
        </div>

        <!-- Login -->
        <div id="loginForm">
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="l-email" placeholder="jan@firma.pl" />
          </div>
          <div class="form-group">
            <label>Hasło</label>
            <input type="password" id="l-pass" placeholder="••••••••" />
          </div>
          <div class="auth-error" id="loginErr"></div>
          <button class="btn-primary" style="width: 100%" id="loginBtn">
            Zaloguj się
          </button>
        </div>

        <!-- Register -->
        <div id="registerForm" style="display: none">
          <div class="form-group">
            <label>Imię i nazwisko</label>
            <input type="text" id="r-name" placeholder="Jan Kowalski" />
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="r-email" placeholder="jan@firma.pl" />
          </div>
          <div class="form-group">
            <label>Hasło (min. 6 znaków)</label>
            <input type="password" id="r-pass" placeholder="••••••••" />
          </div>
          <div class="auth-error" id="registerErr"></div>
          <button class="btn-primary" style="width: 100%" id="registerBtn">
            Załóż konto
          </button>
        </div>

        <div class="auth-divider"><span>lub</span></div>
        <button class="btn-google" id="googleBtn">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path
              fill="#FFC107"
              d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34.5 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"
            />
            <path
              fill="#FF3D00"
              d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34.5 6.5 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
            />
            <path
              fill="#4CAF50"
              d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.3C9.7 35.6 16.3 44 24 44z"
            />
            <path
              fill="#1976D2"
              d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.2-4.2 5.6l6.2 5.2C37 38.6 44 33 44 24c0-1.3-.1-2.6-.4-3.9z"
            />
          </svg>
          Kontynuuj z Google
        </button>
      </div>
    </div>

    <!-- ═══ PANEL SCREEN ═══ -->
    <div id="panelScreen" style="display: none">
      <nav id="nav">
        <div class="logo">Web<span>Craft</span></div>
        <div class="panel-nav-right">
          <span id="userGreet"></span>
          <button class="nav-cta" style="opacity: 1" id="logoutBtn">
            Wyloguj →
          </button>
        </div>
      </nav>

      <!-- CLIENT PANEL -->
      <div id="clientPanel" style="display: none">
        <div class="panel-wrap">
          <div class="panel-header">
            <h1>Twoje zamówienia</h1>
            <p class="section-sub">
              Śledź status swojego projektu w czasie rzeczywistym.
            </p>
            <button
              class="btn-primary"
              style="margin-top: 16px"
              onclick="window.location.href = 'index.html'"
            >
              + Nowe zamówienie
            </button>
          </div>
          <div id="clientOrders" class="orders-list">
            <div class="loading-spinner">Ładowanie zamówień...</div>
          </div>
        </div>
      </div>

      <!-- ADMIN PANEL -->
      <div id="adminPanel" style="display: none">
        <div class="panel-wrap">
          <div class="panel-header">
            <div class="admin-badge">🛡️ Panel Administratora</div>
            <h1>Zarządzanie WebCraft</h1>
            <p class="section-sub">
              Pełna kontrola nad zamówieniami i użytkownikami.
            </p>
          </div>

          <!-- Zakładki: Zamówienia / Użytkownicy -->
          <div
            id="adminTabBar"
            style="display: flex; gap: 8px; margin-bottom: 24px"
          ></div>

          <!-- Statystyki (zamówienia) -->
          <div class="admin-stats" id="adminStats"></div>

          <!-- Filtry zamówień -->
          <div class="admin-filters" id="adminFilters">
            <button class="filter-btn active" data-filter="ALL">
              Wszystkie
            </button>
            <button class="filter-btn" data-filter="PENDING">
              ⏳ Wycena w toku
            </button>
            <button class="filter-btn" data-filter="PRICED">💰 Czeka</button>
            <button class="filter-btn" data-filter="PAYMENT">
              💳 Płatność
            </button>
            <button class="filter-btn" data-filter="ACCEPTED">
              🔨 W realizacji
            </button>
            <button class="filter-btn" data-filter="DELIVERED">
              ✅ Dostarczone
            </button>
            <button class="filter-btn" data-filter="REJECTED">
              ❌ Odrzucone
            </button>
          </div>

          <!-- Lista zamówień / użytkowników (wspólny kontener) -->
          <div id="adminOrders" class="orders-list">
            <div class="loading-spinner">Ładowanie...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ORDER DETAIL MODAL -->
    <div class="modal-overlay" id="orderModal">
      <div class="modal" id="orderModalContent"></div>
    </div>

    <!-- SCRIPTS — kolejność ma znaczenie! -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/panel.js"></script>
  </body>
</html>
